[airtag]
threshold = 0.70
min_total_weight = 0.50
required_eventually = ["rotation_cohort"]
# Either a near-perfect rotation_cohort handoff OR a near-identical
# observation window decides the merge on its own. The decisive path
# also rescues airtag pairs that today abstain on
# missing_eventually:rotation_cohort when packets-table writes are
# off — co_lifespan_match needs only the observations table, so a
# clear handoff (one ends, one begins) is now enough.
decisive_signals = ["rotation_cohort", "co_lifespan_match"]

[airtag.weights]
rotation_cohort   = 0.30
co_lifespan_match = 0.15
rssi_signature    = 0.20
status_byte_match = 0.15
apple_continuity  = 0.10
adv_interval      = 0.05
pdu_distribution  = 0.05

[airtag.params.rotation_cohort]
# IMPORTANT: ``expected_rotation`` is the **expected handoff-gap
# duration** in the score formula, NOT the RPA rotation interval.
# The signal's score is `1 - |best_gap - expected_rotation| /
# expected_rotation`, evaluated only inside [window_min, window_max].
#
# Setting it to 900 (the AirTag rotation period) made the math
# unreachable — best_gap is at most window_max=60, so delta was
# always >= 840, score always <= 0.07. See deep-dive doc §1b.
#
# 30 s puts the score's peak in the middle of the handoff window so
# typical observed gaps (1-60 s during the rotation moment) score
# usefully. The signal needs the packets table populated to fire at
# all (see §1c).
expected_rotation = 30.0
window_min        = 0.05
window_max        = 60.0

[airtag.params.rssi_signature]
min_sniffers      = 2
std_floor         = 1.5
z_full_mismatch   = 4.0
recent_window     = 30.0

[airtag.params.apple_continuity]
airtag_set_match_score = 0.40
