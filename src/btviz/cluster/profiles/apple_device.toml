[apple_device]
# Apple devices broadcast Continuity TLVs constantly — the protocol
# itself is the strongest clustering signal we have for them. Threshold
# is set so an exact long-payload match (1.0 weighted at 0.55) plus
# any of the supporting signals is enough to merge.
threshold = 0.75
min_total_weight = 0.40
# A perfect Continuity-payload match OR a near-identical observation
# window is decisive on its own — both are strong-enough single
# signals that when they fire (without contradicting evidence) we
# don't need supporting signals to merge. Solves the apple_device
# pair case where two RPAs had matching windows + perfect mfg_data
# match but the weighted sum landed at 0.56 and abstained.
decisive_signals = ["apple_continuity", "co_lifespan_match"]

[apple_device.weights]
apple_continuity  = 0.55
co_lifespan_match = 0.15
mfg_data_prefix   = 0.20
service_uuid_match = 0.05
adv_interval      = 0.05
rssi_signature    = 0.00

[apple_device.params.apple_continuity]
# Production default — long Continuity payloads (Handoff, NearbyInfo
# auth tags, AirPods proximity bytes) embed enough entropy at this
# length that a byte-for-byte match between two devices is essentially
# never coincidence.
min_fingerprint_bytes = 8
