[default]
# Catch-all profile for any device_class without its own TOML.
# threshold tuned conservatively because this profile is class-agnostic
# and the cost of a false-merge is high.
threshold = 0.85
min_total_weight = 0.50

[default.weights]
service_uuid_match = 0.25
mfg_data_prefix    = 0.20
apple_continuity   = 0.20   # helps mac / apple_watch / etc. that fall here
adv_interval       = 0.10
rssi_signature     = 0.10
pdu_distribution   = 0.10
tx_power_match     = 0.05
