[hearing_aid]
threshold = 0.75
min_total_weight = 0.55
# ``required_for_merge = ["service_uuid_match"]`` previously sat
# here as a hard gate. In practice it didn't end up blocking pairs
# in the user's data (UUID16 history was actually present), but
# it's a footgun: when an HA model doesn't broadcast UUID16s
# specifically, every pair would silently abstain regardless of
# how strong the other evidence was. Removing the hard gate makes
# the profile more robust without changing behaviour for HAs that
# DO advertise service UUIDs (the score remains weighted by 0.40
# below).
#
# Adding ``co_lifespan_match`` was tried and rejected: the user's
# left and right HAs broadcast concurrently with identical service
# UUIDs (same model), so adding any positive lifespan-overlap
# weight tips the L+R pair past the 0.75 threshold — a false
# positive. Distinguishing physical-L from physical-R requires
# either ``rotation_cohort``'s concurrent-rejection (needs Record
# packets ON) or ``rssi_signature``'s different-distance signal
# (also needs the packets table). Both are deferred until Record
# packets is on by default.

[hearing_aid.weights]
service_uuid_match = 0.40
rssi_signature     = 0.25
mfg_data_prefix    = 0.15
adv_interval       = 0.10
tx_power_match     = 0.05
pdu_distribution   = 0.05

[hearing_aid.params.service_uuid_match]
dispositive_min_uuids = 2

[hearing_aid.params.rssi_signature]
min_sniffers  = 1
std_floor     = 1.5
recent_window = 120.0

[hearing_aid.params.adv_interval]
min_packets       = 100
ppm_full_mismatch = 100.0
