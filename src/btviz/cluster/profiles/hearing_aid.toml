[hearing_aid]
threshold = 0.75
min_total_weight = 0.55
required_for_merge = ["service_uuid_match"]

[hearing_aid.weights]
service_uuid_match = 0.40
rssi_signature     = 0.25
mfg_data_prefix    = 0.15
adv_interval       = 0.10
tx_power_match     = 0.05
pdu_distribution   = 0.05

[hearing_aid.params.service_uuid_match]
dispositive_min_uuids = 2

[hearing_aid.params.rssi_signature]
min_sniffers  = 1
std_floor     = 1.5
recent_window = 120.0

[hearing_aid.params.adv_interval]
min_packets       = 100
ppm_full_mismatch = 100.0
